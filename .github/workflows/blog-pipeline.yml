# Geck Inspect blog pipeline. Fully autonomous: research -> draft -> publish
# happens inside a single workflow run, commits straight to main, no PR gate.
# An email lands when a post goes live.
#
# Stages on a shared schedule so each can fail without poisoning the others:
#
#   research        Mon/Wed/Fri 06:00 UTC  refreshes docs/blog-queue.json.
#   draft-publish   Mon/Wed/Fri 07:00 UTC  drafts the top-scored topic, sanitizes,
#                                          publishes to src/data/blog-posts.js,
#                                          and emails the live link.
#   weekly-report   Monday      12:00 UTC  commits report, opens issue, emails.
#
# Secrets required (repo, Settings, Secrets and variables, Actions):
#
#   ANTHROPIC_API_KEY   Claude API (Sonnet 4.6 + Haiku 4.5)
#   RESEND_API_KEY      Resend.com API key for emails
#   BLOG_REPORT_EMAIL   recipient address (e.g. tennysontaggart@gmail.com)
#
# Optional:
#   BLOG_FROM_EMAIL     sender address (defaults to onboarding@resend.dev)

name: blog-pipeline

on:
  schedule:
    - cron: '0 6 * * 1,3,5'   # research
    - cron: '0 7 * * 1,3,5'   # draft + publish
    - cron: '0 12 * * 1'      # weekly report
  workflow_dispatch:
    inputs:
      stage:
        description: Which stage to run manually
        required: true
        default: draft-publish
        type: choice
        options:
          - research
          - draft-publish
          - weekly-report

permissions:
  contents: write
  issues: write

concurrency:
  # Never run the same stage twice in parallel: they write the same files.
  group: blog-pipeline-${{ github.event.schedule || github.event.inputs.stage }}
  cancel-in-progress: false

jobs:
  research:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1,3,5') ||
      (github.event_name == 'workflow_dispatch' && inputs.stage == 'research')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk@^0.88.0
      - name: Run research agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/blog/research.mjs
      - name: Commit queue updates
        run: |
          git config user.name  "geckinspect-blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add docs/blog-queue.json docs/blog-reports/_latest-research.json docs/blog-budget.json
          if git diff --cached --quiet; then
            echo "No queue changes this run."
          else
            git commit -m "blog: refresh topic queue (research pass)"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && break
              sleep $((2 ** i))
            done
          fi
      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          BLOG_REPORT_EMAIL: ${{ secrets.BLOG_REPORT_EMAIL }}
          BLOG_FROM_EMAIL:   ${{ secrets.BLOG_FROM_EMAIL }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/blog/notify-failure.mjs research

  draft-publish:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1,3,5') ||
      (github.event_name == 'workflow_dispatch' && inputs.stage == 'draft-publish')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk@^0.88.0
      - name: Run draft agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/blog/draft.mjs
      - name: Detect drafted post
        id: detect
        run: |
          if [ -f docs/blog-reports/_latest-draft.json ]; then
            SLUG=$(node -e "console.log(require('./docs/blog-reports/_latest-draft.json').slug)")
            TITLE=$(node -e "console.log(require('./docs/blog-reports/_latest-draft.json').title)")
            echo "slug=$SLUG"   >> "$GITHUB_OUTPUT"
            echo "title=$TITLE" >> "$GITHUB_OUTPUT"
            echo "drafted=1"    >> "$GITHUB_OUTPUT"
          else
            echo "drafted=0"    >> "$GITHUB_OUTPUT"
            echo "Nothing drafted this run, exiting cleanly."
          fi
      - name: Publish into blog-posts.js
        if: steps.detect.outputs.drafted == '1'
        run: node scripts/blog/publish.mjs "${{ steps.detect.outputs.slug }}"
      - name: Verify build still passes
        if: steps.detect.outputs.drafted == '1'
        run: |
          # If publish.mjs ever produces invalid JS, fail fast BEFORE
          # we push to main and break production.
          node --check src/data/blog-posts.js
      - name: Commit + push
        if: steps.detect.outputs.drafted == '1'
        run: |
          git config user.name  "geckinspect-blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add src/data/blog-posts.js docs/blog-queue.json docs/blog-budget.json docs/blog-reports/_latest-draft.json content/blog-drafts
          if git diff --cached --quiet; then
            echo "Nothing to commit (publish was a no-op)."
            exit 0
          fi
          git commit -m "blog: publish ${{ steps.detect.outputs.slug }}"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin main && break
            sleep $((2 ** i))
          done
      - name: Email published link
        if: steps.detect.outputs.drafted == '1'
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          BLOG_REPORT_EMAIL: ${{ secrets.BLOG_REPORT_EMAIL }}
          BLOG_FROM_EMAIL:   ${{ secrets.BLOG_FROM_EMAIL }}
          SLUG:              ${{ steps.detect.outputs.slug }}
        run: node scripts/blog/notify-publish.mjs "$SLUG"
      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          BLOG_REPORT_EMAIL: ${{ secrets.BLOG_REPORT_EMAIL }}
          BLOG_FROM_EMAIL:   ${{ secrets.BLOG_FROM_EMAIL }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/blog/notify-failure.mjs draft-publish

  weekly-report:
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1') ||
      (github.event_name == 'workflow_dispatch' && inputs.stage == 'weekly-report')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Anthropic SDK
        run: npm install --no-save @anthropic-ai/sdk@^0.88.0
      - name: Generate weekly report
        run: node scripts/blog/weekly-report.mjs
      - name: Commit report
        run: |
          git config user.name  "geckinspect-blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add docs/blog-reports/
          if git diff --cached --quiet; then
            echo "Report unchanged."
          else
            git commit -m "blog: weekly report"
            for i in 1 2 3 4; do
              git pull --rebase origin main && git push origin main && break
              sleep $((2 ** i))
            done
          fi
      - name: Open weekly report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create blog-report --color FFA500 --description "Auto-generated weekly report from blog-pipeline" 2>/dev/null || true
          TITLE=$(node -e "console.log(require('./docs/blog-reports/_latest-report.json').issueTitle)")
          BODY_FILE=$(node -e "console.log(require('./docs/blog-reports/_latest-report.json').reportPath)")
          gh issue create --title "$TITLE" --body-file "$BODY_FILE" --label blog-report
      - name: Email weekly report
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          BLOG_REPORT_EMAIL: ${{ secrets.BLOG_REPORT_EMAIL }}
          BLOG_FROM_EMAIL:   ${{ secrets.BLOG_FROM_EMAIL }}
        run: node scripts/blog/notify-weekly-report.mjs
      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY:    ${{ secrets.RESEND_API_KEY }}
          BLOG_REPORT_EMAIL: ${{ secrets.BLOG_REPORT_EMAIL }}
          BLOG_FROM_EMAIL:   ${{ secrets.BLOG_FROM_EMAIL }}
          RUN_URL:           ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/blog/notify-failure.mjs weekly-report
