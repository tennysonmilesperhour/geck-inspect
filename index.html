<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Fonts: preconnect + async CSS swap so the stylesheet doesn't
         block first paint (CWV / LCP win). The `media="print"` trick
         flips the media query back to `all` as soon as the CSS
         download finishes; until then the font falls back to
         system-ui, which matches Inter's metrics closely enough that
         CLS stays near zero. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@300;400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Righteous&family=Inter:wght@300;400;500;600;700&display=swap" />
    </noscript>

    <!-- Primary SEO -->
    <title>Geck Inspect — Crested Gecko Collection, Breeding &amp; Community Platform</title>
    <meta name="description" content="Geck Inspect is the professional platform for crested gecko breeders and keepers. Track collections, plan breedings, log weights, identify morphs with AI, research lineages, and connect with the community." />
    <meta name="keywords" content="crested gecko, gecko breeding, gecko tracker, Correlophus ciliatus, morph guide, lineage, breeding plan, gecko care, reptile breeder, morph identification, gecko collection manager" />
    <meta name="author" content="Geck Inspect" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- NO hardcoded <link rel="canonical">. Per-route canonicals are
         emitted by:
           - scripts/prerender.mjs at build time (static HTML injected into
             the prerendered index.html shipped for every indexable route,
             which is what non-JS crawlers like GPTBot/ClaudeBot/CCBot see),
           - src/components/seo/Seo.jsx at runtime via react-helmet-async
             (what JS-executing crawlers like Googlebot see).
         Shipping a global canonical here would tell every inner URL it
         is actually the homepage (the pre-2026-04 audit bug). -->
    <link rel="alternate" hreflang="x-default" href="https://geckinspect.com/" />
    <link rel="alternate" hreflang="en" href="https://geckinspect.com/" />

    <!-- Auto-noindex on any host that isn't production. Keeps staging,
         preview deployments, and the vercel.app subdomain out of Google
         so they don't compete with geckinspect.com for ranking. -->
    <script>
      (function () {
        var h = location.hostname;
        var isProd = h === 'geckinspect.com' || h === 'www.geckinspect.com';
        if (!isProd) {
          var m = document.createElement('meta');
          m.name = 'robots';
          m.content = 'noindex, nofollow';
          document.head.appendChild(m);
        }
      })();
    </script>

    <!-- Google Analytics 4 — prod hostnames only. Staging and preview
         builds skip the script entirely so they don't pollute the GA
         stream. `send_page_view: false` prevents a double pageview on
         initial load; GA4PageTracker.jsx fires one explicit page_view
         per React-Router navigation (including the first render). -->
    <script>
      (function () {
        var h = location.hostname;
        var isProd = h === 'geckinspect.com' || h === 'www.geckinspect.com';
        if (!isProd) return;
        var GA_ID = 'G-WLGHJ7KC2N';
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        window.gtag = function () { window.dataLayer.push(arguments); };
        window.gtag('js', new Date());
        window.gtag('config', GA_ID, { send_page_view: false });
      })();
    </script>

    <!-- Theme + accent — apply persisted choices synchronously before
         CSS/JS loads so users don't see a flash of the default palette.
         data-theme drives backgrounds/surfaces/sage/slate; data-secondary
         drives the emerald accent palette. Both default to 'normal'. -->
    <script>
      (function () {
        var allowed = ['normal','tangerine','halloween-mask','blizzard','lavender','super-hypo'];
        function pick(key) {
          try {
            var v = localStorage.getItem(key);
            return allowed.indexOf(v) !== -1 ? v : 'normal';
          } catch (e) { return 'normal'; }
        }
        document.documentElement.setAttribute('data-theme', pick('geckinspect.theme'));
        document.documentElement.setAttribute('data-secondary', pick('geckinspect.secondary'));
        document.documentElement.classList.add('dark');
      })();
    </script>
    <meta name="theme-color" content="#064e3b" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Geck Inspect" />
    <meta name="application-name" content="Geck Inspect" />

    <!-- Favicon / app icons (using current hosted logo; swap for local asset later) -->
    <link rel="icon" type="image/png" href="https://geckinspect.com/logo.png" />
    <link rel="apple-touch-icon" href="https://geckinspect.com/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Geck Inspect" />
    <meta property="og:title" content="Geck Inspect — Crested Gecko Collection, Breeding &amp; Community Platform" />
    <meta property="og:description" content="The professional platform for crested gecko breeders and keepers. Track collections, plan breedings, identify morphs with AI, and connect with the community." />
    <meta property="og:url" content="https://geckinspect.com/" />
    <meta property="og:image" content="https://geckinspect.com/logo.png" />
    <meta property="og:image:alt" content="Geck Inspect logo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Geck Inspect — Crested Gecko Collection, Breeding &amp; Community Platform" />
    <meta name="twitter:description" content="The professional platform for crested gecko breeders and keepers. Track collections, plan breedings, identify morphs with AI, and connect with the community." />
    <meta name="twitter:image" content="https://geckinspect.com/logo.png" />

    <!-- Robauto.ai — A.I. Growth Engine Pixel. Detects LLM bot traffic
         and AI referrals (ChatGPT, Claude, Perplexity, etc.) so we can
         attribute organic AI-driven visits. Fires once per page load via
         sendBeacon (XHR fallback) and is non-blocking. -->
    <script>
    (function(){
      var pid="94be07bb-a48d-44fa-b1d0-c9d88d2fc975";
      var ep="https://hkeytqaukllckucnhzey.supabase.co/functions/v1/track";
      var d=JSON.stringify({path:location.pathname,url:location.href,referer:document.referrer});
      if(navigator.sendBeacon){navigator.sendBeacon(ep+"?pid="+pid,d)}
      else{var x=new XMLHttpRequest();x.open("POST",ep+"?pid="+pid);x.setRequestHeader("Content-Type","application/json");x.send(d)}
    })();
    </script>

    <!-- Site-level structured data (Organization + WebSite). Page-specific
         schema (Article, FAQPage, HowTo, Product, BreadcrumbList) is emitted
         per-route by <Seo>; keeping these two here means they exist on every
         page without the duplication penalty of shipping a page-specific
         SoftwareApplication on morph/care/genetics URLs. -->

    <!-- Organization: canonical entity record. The Seo component imports
         the same shape from src/lib/organization-schema.js so sameAs stays
         in sync across every page. Update there, not here. -->
    <script type="application/ld+json" id="ld-organization">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://geckinspect.com/#organization",
      "name": "Geck Inspect",
      "alternateName": ["Geck Inspect — Crested Gecko Platform", "geckOS"],
      "url": "https://geckinspect.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://geckinspect.com/logo.png",
        "width": 512,
        "height": 512
      },
      "description": "Professional platform for crested gecko breeders and keepers, providing collection management, breeding planning, AI-powered morph identification, lineage tracking, and community tools.",
      "knowsAbout": [
        "Crested gecko",
        "Correlophus ciliatus",
        "Reptile husbandry",
        "Gecko breeding",
        "Morph genetics",
        "Lineage tracking"
      ],
      "sameAs": [
        "https://www.instagram.com/the.gecko.garden/",
        "https://www.instagram.com/the.reptile.garden/"
      ]
    }
    </script>

    <!-- WebSite: enables Google sitelinks search box and binds the site as
         a first-class entity. The potentialAction target uses an internal
         search URL pattern even if the UI doesn't surface a box yet, so
         the structured data is valid and future-proof. -->
    <script type="application/ld+json" id="ld-website">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "@id": "https://geckinspect.com/#website",
      "name": "Geck Inspect",
      "url": "https://geckinspect.com/",
      "description": "The professional platform for crested gecko breeders and keepers. Track collections, plan breedings, identify morphs with AI, and connect with the community.",
      "inLanguage": "en-US",
      "publisher": { "@id": "https://geckinspect.com/#organization" },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://geckinspect.com/MorphGuide?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
